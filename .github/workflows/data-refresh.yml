name: Data Refresh

on:
  schedule:
    # 9:30 PM ET weekdays (01:30 UTC next day)
    - cron: '30 1 * * 2-6'
  workflow_dispatch:
    inputs:
      force_refresh:
        description: 'Force full data refresh (ignore cache)'
        required: false
        default: 'false'
        type: boolean

jobs:
  pull-data:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: true
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Install Streamlit app dependencies
        run: pip install -r requirements.txt

      - name: Pull data
        run: python scripts/pull_data.py
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          FORCE_REFRESH: ${{ github.event.inputs.force_refresh || 'false' }}

      - name: Verify outputs
        run: |
          echo "=== Data files ==="
          ls -lh public/data/
          echo "=== Last updated ==="
          cat public/data/last_updated.json

      - name: Run Streamlit parity and smoke tests
        run: pytest -q

      - name: Commit data
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: 'data: refresh prices + event returns [automated]'
          file_pattern: 'public/data/*'
          commit_user_name: 'github-actions[bot]'
          commit_user_email: 'github-actions[bot]@users.noreply.github.com'
